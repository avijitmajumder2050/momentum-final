version: "3.9"
services:
  api:
    build: .
    image: momentum-platform:latest
    container_name: momentum-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - runtime.env
    environment:
      - USE_SSM=true
      - AWS_REGION=ap-south-1
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
