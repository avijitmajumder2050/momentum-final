version: "3.9"

services:
  api:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    image: momentum-watchlist:latest
    container_name: momentum-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # SSM is the source of truth on EC2 — these are only used locally
      - USE_SSM=${USE_SSM:-true}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - MAX_LOSS=${MAX_LOSS:-1000}
      - DEPLOY_PCT=${DEPLOY_PCT:-0.30}
      - MONITOR_INTERVAL=${MONITOR_INTERVAL:-15}
      # Local dev only (.env file, USE_SSM=false)
      - apiKey=${apiKey:-}
      - totpKey=${totpKey:-}
      - userid=${userid:-}
      - pin=${pin:-}
      - S3_BUCKET=${S3_BUCKET:-your-momentum-bucket}
      - TRADING_CAPITAL=${TRADING_CAPITAL:-100000}
    volumes:
      # For local dev: mount backend code for hot-reload
      - ../backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
